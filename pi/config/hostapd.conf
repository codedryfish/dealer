# hostapd.conf — Pi Zero 2 W WiFi Access Point configuration
# SSID: DEALER | WPA2 | Channel 6

interface=wlan0
driver=nl80211
ssid=DEALER
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=dealermeplease
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
